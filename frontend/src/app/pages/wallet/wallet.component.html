<div class="page">
  <h1 class="title">Wallet</h1>
  <p class="sub">Balances update after deals and deposits.</p>

  <div class="grid" *ngIf="!loading(); else skel">
    <div class="card big">
      <p class="label">Available Balance</p>
      <p class="amt">${{ balance | number : '1.2-2' }}</p>
    </div>
    <div class="card big accent">
      <p class="label">Escrow Balance</p>
      <p class="amt">${{ escrow | number : '1.2-2' }}</p>
    </div>
  </div>

  <button type="button" class="btn" (click)="openModal()">Add Funds</button>

  <p class="note">Deposits in this environment credit your balance directly for testing.</p>
</div>

<ng-template #skel>
  <div class="grid">
    <div class="card sk"><div class="sh"></div></div>
    <div class="card sk"><div class="sh"></div></div>
  </div>
</ng-template>

<div class="overlay" *ngIf="modalOpen()" (click)="closeModal()">
  <div class="dialog" (click)="$event.stopPropagation()">
    <h2>Add funds</h2>
    <form [formGroup]="form" (ngSubmit)="addFunds()">
      <label>Amount (USD)</label>
      <input class="input" type="text" formControlName="amount" placeholder="0.00" />
      <p class="err" *ngIf="form.controls.amount.touched && form.controls.amount.invalid">Enter a valid amount.</p>
      <div class="row">
        <button type="button" class="ghost" (click)="closeModal()">Close</button>
        <button type="submit" class="btn sm" [disabled]="submitting()">{{ submitting() ? '…' : 'Add' }}</button>
      </div>
    </form>
  </div>
</div>
