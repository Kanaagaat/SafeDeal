<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <svg width="48" height="48" viewBox="0 0 28 28" fill="none">
        <path d="M14 2L4 7V14C4 19.5 8.5 24.6 14 26C19.5 24.6 24 19.5 24 14V7L14 2Z"
              fill="#2563EB" stroke="#2563EB" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M10 14L12.5 16.5L18 11" stroke="white" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1 class="login-title">Войти в SafeDeal</h1>
      <p class="login-subtitle">Введите свои учетные данные для входа</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username" class="form-label">Имя пользователя</label>
        <input
          type="text"
          id="username"
          formControlName="username"
          class="form-input"
          [class.error]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
          placeholder="Введите имя пользователя"
        >
        <div class="error-message" *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
          Имя пользователя обязательно
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Пароль</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="form-input"
          [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          placeholder="Введите пароль"
        >
        <div class="error-message" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Пароль обязателен
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        class="login-button"
        [disabled]="isLoading"
      >
        <span *ngIf="isLoading" class="spinner"></span>
        {{ isLoading ? 'Вход...' : 'Войти' }}
      </button>
    </form>

    <div class="register-link">
      <p>Нет аккаунта? <a routerLink="/register" class="link">Зарегистрироваться</a></p>
    </div>
  </div>
</div>
