<div class="rating-dialog">
  <div class="rating-dialog__overlay" (click)="closeDialog()"></div>
  <div class="rating-dialog__content">
    <div class="rating-header">
      <h2>Leave a review</h2>
      <p>Rate your experience with {{ data.toUser }}</p>
    </div>

    <div class="rating-body" *ngIf="!submitted">
      <div class="rating-stars">
        <button
          *ngFor="let i of [1, 2, 3, 4, 5]"
          class="star-button"
          [class.filled]="i <= rating"
          (click)="setRating(i)"
          type="button"
        >
          <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
        </button>
      </div>

      <div class="rating-text">
        <span class="rating-value">{{ rating }}</span>
        <span class="rating-label">out of 5 stars</span>
      </div>

      <div class="comment-section">
        <label for="comment" class="comment-label">Comment (optional)</label>
        <textarea
          id="comment"
          [(ngModel)]="comment"
          class="comment-input"
          placeholder="Share your thoughts (max 500 characters)"
          maxlength="500"
          rows="4"
        ></textarea>
        <span class="char-count">{{ comment.length }}/500</span>
      </div>
    </div>

    <div class="rating-success" *ngIf="submitted">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      <h3>Thank you for your feedback!</h3>
      <p>Your review helps improve SafeDeal</p>
    </div>

    <div class="rating-actions" *ngIf="!submitted">
      <button
        class="btn-primary"
        (click)="submitRating()"
        [disabled]="isSubmitting"
      >
        <span *ngIf="isSubmitting" class="spinner"></span>
        {{ isSubmitting ? 'Sending...' : 'Submit review' }}
      </button>
      <button
        class="btn-secondary"
        (click)="closeDialog()"
        [disabled]="isSubmitting"
      >
        Skip
      </button>
    </div>

    <div class="rating-actions" *ngIf="submitted">
      <button class="btn-primary" (click)="closeDialog()">
        Close
      </button>
    </div>
  </div>
</div>
