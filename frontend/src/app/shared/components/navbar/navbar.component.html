<nav class="navbar">
  <ng-container *ngIf="isLoggedIn; else staticLogo">
    <a class="navbar__brand" routerLink="/dashboard" (click)="closeMenu()">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <path d="M14 2L4 7V14C4 19.5 8.5 24.6 14 26C19.5 24.6 24 19.5 24 14V7L14 2Z"
              fill="#2563EB" stroke="#2563EB" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M10 14L12.5 16.5L18 11" stroke="white" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="navbar__logo-text">SafeDeal</span>
    </a>
  </ng-container>
  <ng-template #staticLogo>
    <div class="navbar__brand navbar__brand--static">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <path d="M14 2L4 7V14C4 19.5 8.5 24.6 14 26C19.5 24.6 24 19.5 24 14V7L14 2Z"
              fill="#2563EB" stroke="#2563EB" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M10 14L12.5 16.5L18 11" stroke="white" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="navbar__logo-text">SafeDeal</span>
    </div>
  </ng-template>

  <button class="navbar__hamburger" (click)="toggleMenu()" *ngIf="isLoggedIn">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <div class="navbar__links" [class.navbar__links--open]="menuOpen" *ngIf="isLoggedIn">
    <a routerLink="/dashboard" routerLinkActive="active" class="navbar__link" (click)="closeMenu()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Dashboard
    </a>
    <a routerLink="/create-deal" routerLinkActive="active" class="navbar__link" (click)="closeMenu()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      Create Deal
    </a>
    <a routerLink="/wallet" routerLinkActive="active" class="navbar__link" (click)="closeMenu()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <path d="M16 13a1 1 0 100-2 1 1 0 000 2z" fill="currentColor"/>
      </svg>
      Wallet
    </a>
    <a routerLink="/profile" routerLinkActive="active" class="navbar__link" (click)="closeMenu()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
  </div>

  <div class="navbar__auth">
    <ng-container *ngIf="!isLoggedIn">
      <a routerLink="/login" class="navbar__link navbar__link--auth">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Login
      </a>
    </ng-container>
    <ng-container *ngIf="isLoggedIn">
      <div class="navbar__balance">
        <div class="balance-item">
          <span class="balance-label">Balance:</span>
          <span class="balance-amount">${{ balance }}</span>
        </div>
        <div class="balance-item">
          <span class="balance-label">Escrow:</span>
          <span class="balance-amount">${{ escrowBalance }}</span>
        </div>
      </div>
      <span class="navbar__user">{{ currentUser?.username }}</span>
      <button (click)="logout()" class="navbar__link navbar__link--auth navbar__logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </ng-container>
  </div>
</nav>
