<nav class="nav">
  <div class="nav-inner">
    <a routerLink="/dashboard" class="brand" (click)="closeMenu()">SafeDeal</a>

    <button type="button" class="burger" (click)="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>

    <div class="links" [class.open]="menuOpen">
      <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">Dashboard</a>
      <a routerLink="/deals/create" routerLinkActive="active" (click)="closeMenu()">Create Deal</a>
      <a routerLink="/wallet" routerLinkActive="active" (click)="closeMenu()">Wallet</a>
      <a routerLink="/profile" routerLinkActive="active" (click)="closeMenu()">Profile</a>
    </div>

    <div class="right" [class.open]="menuOpen">
      <div class="balances" *ngIf="wallet.balance$ | async as bal">
        Balance: <strong>${{ bal.balance | number : '1.2-2' }}</strong> &nbsp;|&nbsp; Escrow:
        <strong>${{ bal.escrow_balance | number : '1.2-2' }}</strong>
      </div>
      <button type="button" class="logout" (click)="logout()">Logout</button>
    </div>
  </div>
</nav>
